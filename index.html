<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조직혁신 통합 포털 · 대전관광공사</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Cafe24PROSlimMax';
      src: url('https://cdn.jsdelivr.net/gh/fonts-archive/Cafe24PROSlimMax/Cafe24PROSlim-Max.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/gh/fonts-archive/Cafe24PROSlimMax/Cafe24PROSlim-Max.woff') format('woff');
      font-weight: normal; font-style: normal; font-display: swap;
    }
    @font-face {
      font-family: 'Cafe24PROSlimAir';
      src: url('https://cdn.jsdelivr.net/gh/fonts-archive/Cafe24PROSlimAir/Cafe24PROSlim-Air.woff2') format('woff2'),
           url('https://cdn.jsdelivr.net/gh/fonts-archive/Cafe24PROSlimAir/Cafe24PROSlim-Air.woff') format('woff');
      font-weight: normal; font-style: normal; font-display: swap;
    }
  </style>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1e3a6e;
      --navy2: #2d5499;
      --orange: #e8610a;
      --green: #16a34a;
      --bg: #f0f3f8;
      --surface: #ffffff;
      --text: #1a2035;
      --sub: #64748b;
      --border: #dde5f0;
    }

    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Hero 애니메이션 ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Hero ── */
    .hero {
      background: url('images/hero.png') center center / cover no-repeat;
      padding: clamp(22px, 4vh, 52px) 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      flex: 0 0 auto;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(15, 30, 65, 0.35);
      pointer-events: none;
    }
    .hero-inner { position: relative; max-width: 900px; margin: 0 auto; }
    .hero h1 {
      font-family: 'Cafe24PROSlimMax', 'Noto Sans KR', sans-serif;
      font-size: clamp(28px, 5vw, 54px);
      font-weight: normal;
      line-height: 1.3; margin-bottom: clamp(10px, 1.5vh, 18px);
      white-space: nowrap;
      animation: fadeUp .7s ease both;
    }
    /* 대전관광공사: 흰색 */
    .hero h1 .t-wg {
      color: #ffffff;
    }
    /* 조직혁신 통합 포털: 2023C */
    .hero h1 .t-2023c {
      color: #E18C69;
    }
    .hero p {
      font-family: 'Cafe24PROSlimAir', 'Noto Sans KR', sans-serif;
      font-weight: normal;
      font-size: clamp(15px, 2.2vw, 22px);
      color: rgba(255,255,255,.90);
      line-height: 1.55;
      animation: fadeUp .7s ease .25s both;
    }
    @media (max-width: 600px) {
      .hero h1 { white-space: normal; }
    }

    /* ── Cards ── */
    .cards-section {
      flex: 1;
      width: 100%; max-width: 1000px; margin: 0 auto;
      padding: clamp(14px, 2vh, 28px) 24px clamp(10px, 1.5vh, 20px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: 1fr;
      gap: 16px;
      overflow: hidden;
    }
    @media (max-width: 680px) {
      .cards-section { grid-template-columns: 1fr; overflow-y: auto; }
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      overflow: hidden;
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      transition: transform .2s, box-shadow .2s;
      min-height: 0;
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 14px 40px rgba(0,0,0,.14); }

    .card-img-wrap {
      flex: 1;
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: clamp(24px, 4vh, 36px) 24px clamp(16px, 2.5vh, 24px);
      min-height: 0;
    }
    .ci-blue   { background: #eff6ff; }
    .ci-orange { background: #fff7ed; }
    .ci-green  { background: #f0fdf4; }

    .card-img-wrap img {
      width: 100%; max-width: 190px;
      height: 100%; max-height: clamp(120px, 18vh, 200px);
      object-fit: contain;
    }

    .card-body {
      padding: clamp(12px, 2vh, 18px) 20px clamp(14px, 2.5vh, 24px);
      text-align: center;
      border-top: 1px solid var(--border);
      flex: 0 0 auto;
    }
    .card-sub {
      font-size: 11px; font-weight: 700;
      letter-spacing: .05em; margin-bottom: 5px;
    }
    .cs-blue   { color: var(--navy2); }
    .cs-orange { color: var(--orange); }
    .cs-green  { color: var(--green); }
    .card h2 { font-size: 17px; font-weight: 800; color: var(--navy); }

    /* ── Notice ── */
    .notice-section {
      width: 100%; max-width: 1000px; margin: 0 auto;
      padding: 0 24px clamp(14px, 2vh, 24px);
      flex: 0 0 auto;
    }
    .notice {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--navy);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .notice-ico { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .notice h3 { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .notice p  { font-size: 13px; color: var(--sub); line-height: 1.7; }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-inner">
      <h1><span class="t-wg">대전관광공사</span> <span class="t-2023c">조직혁신 통합 포털</span></h1>
      <p>작은 아이디어가 큰 변화를 만듭니다.<br>대전관광공사 구성원 모두가 조직혁신의 주인공입니다.</p>
    </div>
  </section>

  <!-- 3 Service Cards -->
  <section class="cards-section">

    <!-- 학습동아리 -->
    <a href="https://djto-sp.github.io/djto-studygroup/" class="card">
      <div class="card-img-wrap ci-green">
        <img src="images/char-study.png" alt="학습동아리">
      </div>
      <div class="card-body">
        <div class="card-sub cs-green">조직 현안 관련 과제 발굴</div>
        <h2>학습동아리</h2>
      </div>
    </a>

    <!-- 변화관리마일리지 -->
    <a href="https://djto-sp.github.io/djto-mileage2026/" class="card">
      <div class="card-img-wrap ci-orange">
        <img src="images/char-mileage.png" alt="변화관리마일리지">
      </div>
      <div class="card-body">
        <div class="card-sub cs-orange">개인 역량 개발 및 능동적 조직문화 형성</div>
        <h2>변화관리마일리지</h2>
      </div>
    </a>

    <!-- 혁신드림제안 -->
    <a href="https://djto-sp.github.io/djto-dreamproposal/" class="card">
      <div class="card-img-wrap ci-blue">
        <img src="images/char-proposal.png" alt="혁신드림제안">
      </div>
      <div class="card-body">
        <div class="card-sub cs-blue">현장 중심 아이디어 발굴</div>
        <h2>혁신드림제안제도</h2>
      </div>
    </a>

  </section>

  <!-- Notice -->
  <div class="notice-section">
    <div class="notice">
      <div class="notice-ico">📌</div>
      <div>
        <h3>이용 안내</h3>
        <p>모든 서비스는 PC·모바일 브라우저에서 이용 가능합니다. 자료 업로드 및 관리 기능 이용 시 사번 확인이 필요할 수 있습니다.<br>문의 : 전략기획팀 이지민 주임 📞1148</p>
      </div>
    </div>
  </div>

</body>
</html>
