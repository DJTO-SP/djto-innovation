<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>조직혁신 통합 포털 · 대전관광공사</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #1e3a6e;
      --navy2: #2d5499;
      --orange: #e8610a;
      --green: #16a34a;
      --bg: #f0f3f8;
      --surface: #ffffff;
      --text: #1a2035;
      --sub: #64748b;
      --border: #dde5f0;
    }

    body {
      font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      background: url('images/hero.png') center center / cover no-repeat;
      padding: 110px 20px 140px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute; inset: 0;
      background: rgba(15, 30, 65, 0.52);
      pointer-events: none;
    }
    .hero-inner { position: relative; max-width: 900px; margin: 0 auto; }
    .hero h1 {
      font-size: clamp(20px, 3.5vw, 34px);
      font-weight: 800; color: #fff;
      line-height: 1.3; margin-bottom: 14px;
      white-space: nowrap;
    }
    .hero p {
      font-size: clamp(13px, 1.8vw, 15px);
      color: rgba(255,255,255,.88);
      white-space: nowrap;
    }
    @media (max-width: 600px) {
      .hero h1, .hero p { white-space: normal; }
    }

    /* ── Cards ── */
    .cards-section {
      max-width: 960px; margin: 0 auto;
      padding: 40px 20px 64px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    @media (max-width: 680px) {
      .cards-section { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,.08);
      overflow: hidden;
      display: flex; flex-direction: column;
      text-decoration: none; color: inherit;
      transition: transform .2s, box-shadow .2s;
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 14px 40px rgba(0,0,0,.14); }

    .card-img-wrap {
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 32px 24px 20px;
    }
    .ci-blue   { background: #eff6ff; }
    .ci-orange { background: #fff7ed; }
    .ci-green  { background: #f0fdf4; }

    .card-img-wrap img {
      width: 100%; max-width: 200px;
      height: 200px; object-fit: contain;
    }

    .card-body {
      padding: 16px 20px 24px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    .card-sub {
      font-size: 11px; font-weight: 700;
      letter-spacing: .05em; margin-bottom: 6px;
    }
    .cs-blue   { color: var(--navy2); }
    .cs-orange { color: var(--orange); }
    .cs-green  { color: var(--green); }
    .card h2 { font-size: 17px; font-weight: 800; color: var(--navy); }

    /* ── Notice ── */
    .notice-section {
      max-width: 960px; margin: 0 auto;
      padding: 0 20px 50px;
    }
    .notice {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 4px solid var(--navy);
      border-radius: 10px;
      padding: 16px 20px;
      display: flex; align-items: flex-start; gap: 12px;
    }
    .notice-ico { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
    .notice h3 { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 4px; }
    .notice p  { font-size: 13px; color: var(--sub); line-height: 1.7; }

    /* ── Footer ── */
    footer {
      background: var(--navy);
      color: rgba(255,255,255,.55);
      text-align: center; padding: 22px 20px;
      font-size: 12px;
    }
    footer strong { color: rgba(255,255,255,.9); }
  </style>
</head>
<body>

  <!-- Hero -->
  <section class="hero">
    <div class="hero-inner">
      <h1>대전관광공사 조직혁신 통합 포털</h1>
      <p>제안, 마일리지, 학습동아리 조직혁신 관련 모든 활동을 한 곳에서 이용하세요</p>
    </div>
  </section>

  <!-- 3 Service Cards -->
  <section class="cards-section">

    <!-- 혁신드림제안 -->
    <a href="https://djto-sp.github.io/djto-dreamproposal/" class="card">
      <div class="card-img-wrap ci-blue">
        <img src="images/char-proposal.png" alt="혁신드림제안">
      </div>
      <div class="card-body">
        <div class="card-sub cs-blue">아이디어 제안</div>
        <h2>혁신드림제안제도</h2>
      </div>
    </a>

    <!-- 변화관리마일리지 -->
    <a href="https://djto-sp.github.io/djto-mileage2026/" class="card">
      <div class="card-img-wrap ci-orange">
        <img src="images/char-mileage.png" alt="변화관리마일리지">
      </div>
      <div class="card-body">
        <div class="card-sub cs-orange">활동 기록 · 마일리지</div>
        <h2>변화관리마일리지</h2>
      </div>
    </a>

    <!-- 학습동아리 -->
    <a href="https://djto-sp.github.io/djto-studygroup/" class="card">
      <div class="card-img-wrap ci-green">
        <img src="images/char-study.png" alt="학습동아리">
      </div>
      <div class="card-body">
        <div class="card-sub cs-green">자료 공유 · 학습 관리</div>
        <h2>학습동아리</h2>
      </div>
    </a>

  </section>

  <!-- Notice -->
  <div class="notice-section">
    <div class="notice">
      <div class="notice-ico">📌</div>
      <div>
        <h3>이용 안내</h3>
        <p>모든 서비스는 PC·모바일 브라우저에서 이용 가능합니다. 자료 업로드 및 관리 기능 이용 시 사번 확인이 필요할 수 있습니다.<br>문의 : 전략기획팀 이지민 주임</p>
      </div>
    </div>
  </div>

  <footer>
    <strong>대전관광공사</strong> · <strong>전략기획팀</strong> · <strong>조직혁신 통합 포털</strong><br>
    <span style="font-size:11px;margin-top:4px;display:block;">담당 : <strong>이지민 주임</strong> 📞1148</span>
  </footer>

</body>
</html>
